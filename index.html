<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>HomeStock</title>
<meta name="theme-color" content="#0E5E63">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#F7F6F1; --card:#FFFFFF; --ink:#1C1E1C; --sub:#6B6F6B; --line:#E4E2D9;
    --ok:#1E7A46; --ok-bg:#E7F3EC; --low:#B36A00; --low-bg:#FBF0DC;
    --out:#C0392B; --out-bg:#FAE6E2; --accent:#0E5E63;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:110px;overscroll-behavior-y:none}
  button{font-family:inherit;border:none;cursor:pointer;background:none;user-select:none;-webkit-user-select:none}
  input,select{font-family:inherit;font-size:16px}

  header{padding:24px 20px 12px}
  .brand{color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  .headrow{display:flex;justify-content:space-between;align-items:flex-end}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
  .count{text-align:right}
  .count b{font-family:var(--mono);font-size:24px;display:block;line-height:1}
  .count span{color:var(--sub);font-size:11px}
  .house{color:var(--sub);font-size:11px;margin-top:6px}
  .house button{color:var(--accent);font-weight:600;font-size:11px;text-decoration:underline}

  .tabs{display:flex;background:#ECEAE1;border-radius:12px;padding:4px;margin:0 20px}
  .tabs button{flex:1;padding:9px 0;border-radius:9px;font-size:13px;font-weight:600;color:var(--sub)}
  .tabs button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

  .search{margin:16px 20px 0}
  .search input{width:100%;background:#FFF;border:1px solid var(--line);border-radius:12px;padding:11px 16px;outline:none}
  .search input:focus{border-color:var(--accent)}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:12px 20px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;background:#FFF;border:1px solid var(--line);color:var(--sub);
        border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;white-space:nowrap}
  .chip.on{background:var(--ink);color:#FFF;border-color:var(--ink)}

  .list{display:flex;flex-direction:column;gap:10px;padding:12px 20px 0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:12px 16px;display:flex;align-items:center;gap:12px}
  .card.ok{border-left:4px solid var(--ok)} .card.low{border-left:4px solid var(--low)} .card.out{border-left:4px solid var(--out)}
  .info{flex:1;min-width:0;text-align:left}
  .inforow{display:flex;align-items:center;gap:10px}
  .infotext{flex:1;min-width:0}
  .thumb{width:40px;height:40px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#F2F1EB}
  .thumb-ph{display:flex;align-items:center;justify-content:center;font-size:18px}
  img.thumb{cursor:zoom-in}

  .lightbox{position:fixed;inset:0;background:rgba(20,22,20,.85);display:flex;align-items:center;justify-content:center;z-index:70;cursor:zoom-out}
  .lightbox figure{display:flex;flex-direction:column;align-items:center;gap:12px;max-width:92vw}
  .lightbox img{max-width:92vw;max-height:80vh;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .lightbox figcaption{color:#FFF;font-size:14px;font-weight:600;text-align:center}
  .info .name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .info .name.done{text-decoration:line-through;color:var(--sub)}
  .meta{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:11px}
  .badge{border-radius:6px;padding:2px 6px;font-weight:600}
  .badge.ok{background:var(--ok-bg);color:var(--ok)} .badge.low{background:var(--low-bg);color:var(--low)} .badge.out{background:var(--out-bg);color:var(--out)}
  .cat{color:var(--sub)}

  .stepper{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .stepper button{width:36px;font-size:20px;font-weight:700;background:#F7F6F1;color:var(--ink)}
  .stepper button:disabled{color:#C6C4BA;background:#F2F1EB}
  .stepper button:active:not(:disabled){opacity:.6}
  .qty{width:56px;text-align:center;padding:5px 0}
  .qty b{font-family:var(--mono);font-size:18px;line-height:1;display:block}
  .qty span{color:var(--sub);font-size:10px}
  .qty.ok b{color:var(--ok)} .qty.low b{color:var(--low)} .qty.out b{color:var(--out)}

  .restock{background:var(--ok-bg);color:var(--ok);font-size:12px;font-weight:700;border-radius:10px;padding:9px 12px}
  .advice{background:#EEF3F3;color:var(--accent);font-size:12px;font-weight:700;border-radius:10px;padding:9px 10px;white-space:nowrap}
  .verdict{font-size:15px;font-weight:800;border-radius:12px;padding:12px 16px;margin-bottom:12px}
  .verdict.ok{background:var(--ok-bg);color:var(--ok)} .verdict.low{background:var(--low-bg);color:var(--low)} .verdict.out{background:var(--out-bg);color:var(--out)}
  .why{font-size:13px;line-height:1.55;color:var(--ink);margin-bottom:18px}
  .shoplinks{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .shoplinks a{background:#FFF;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
               text-decoration:none;color:var(--ink);display:flex;flex-direction:column;gap:2px}
  .shoplinks a span{font-weight:700;font-size:13px}
  .shoplinks a small{color:var(--sub);font-size:11px}
  .del{font-size:15px;padding:8px 2px 8px 4px;opacity:.45}
  .del:active{opacity:1}
  input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}

  .empty{text-align:center;padding:36px 32px 0;color:var(--sub);font-size:14px}
  .empty .big{font-size:40px}
  .empty b{color:var(--ink);display:block;margin:8px 0 4px;font-size:15px}
  .quick{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:16px}
  .quick button{background:#FFF;border:1px solid var(--line);color:var(--accent);
                border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600}
  .hint{color:var(--sub);font-size:11px;padding:14px 20px 0}

  .fab{position:fixed;bottom:24px;right:max(24px,calc(50% - 216px));width:56px;height:56px;border-radius:50%;
       background:var(--accent);color:#FFF;font-size:30px;box-shadow:0 4px 14px rgba(14,94,99,.4);
       display:flex;align-items:center;justify-content:center;z-index:20}

  .overlay{position:fixed;inset:0;background:rgba(20,22,20,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .sheet{background:var(--bg);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:20px 20px 34px;max-height:90vh;overflow-y:auto}
  .sheet h2{font-size:17px;font-weight:800}
  .sheet .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .sheet .x{font-size:24px;color:var(--sub);padding:0 4px}
  label{display:block;font-size:11px;font-weight:600;color:var(--sub);margin:0 0 4px}
  .field{width:100%;background:#FFF;border:1px solid var(--line);border-radius:12px;padding:11px 14px;outline:none;margin-bottom:16px}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .note{color:var(--sub);font-size:11px;margin:-8px 0 18px}
  .primary{width:100%;background:var(--accent);color:#FFF;font-weight:700;font-size:14px;border-radius:12px;padding:13px 0}
  .primary:disabled{background:#C9CFC9}
  .photobtn{width:100%;background:#EEF3F3;color:var(--accent);font-weight:700;font-size:13px;border-radius:12px;padding:11px 0;margin:-6px 0 16px;border:1px dashed var(--accent)}
  .photobtn:disabled{opacity:.6}
  .photopreview-wrap{position:relative;width:96px;margin-bottom:14px}
  .photopreview{width:96px;height:96px;object-fit:cover;border-radius:14px;display:block;border:1px solid var(--line)}
  .photopreview-x{position:absolute;top:-7px;right:-7px;background:var(--ink);color:#FFF;width:22px;height:22px;
                  border-radius:50%;font-size:13px;line-height:22px;text-align:center;padding:0}
  .photopreview-crop{position:absolute;bottom:-7px;right:-7px;background:var(--accent);color:#FFF;width:26px;height:26px;
                     border-radius:50%;font-size:13px;line-height:26px;text-align:center;padding:0}

  .cropper{position:fixed;inset:0;background:rgba(20,22,20,.94);z-index:80;display:flex;flex-direction:column;
           align-items:center;justify-content:center;gap:16px;padding:20px}
  .crop-hint{color:#DDD;font-size:13px;text-align:center}
  .crop-stage{position:relative;touch-action:none}
  .crop-stage img{display:block;max-width:88vw;max-height:60vh;border-radius:8px;user-select:none;-webkit-user-select:none;pointer-events:none}
  .crop-box{position:absolute;border:2px solid #FFF;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);cursor:move;touch-action:none}
  .crop-handle{position:absolute;right:-13px;bottom:-13px;width:26px;height:26px;border-radius:50%;
               background:#FFF;border:3px solid var(--accent);cursor:nwse-resize}
  .crop-actions{display:flex;gap:10px;width:100%;max-width:340px}
  .crop-actions button{flex:1;border-radius:12px;padding:12px 0;font-weight:700;font-size:14px}
  .crop-cancel{background:#3A3D3A;color:#FFF}
  .crop-ok{background:var(--accent);color:#FFF}
  .danger{width:100%;color:var(--out);font-weight:600;font-size:13px;padding:10px 0;margin-top:6px}

  .gate{padding:60px 28px;text-align:center}
  .gate .big{font-size:44px}
  .gate h1{margin:10px 0 6px}
  .gate p{color:var(--sub);font-size:13px;line-height:1.5;margin-bottom:20px}
  .gate input{width:100%;text-align:center;font-family:var(--mono);font-size:16px;letter-spacing:.05em}
  .gate .alt{color:var(--sub);font-size:12px;margin-top:14px}
  .gate .alt button{color:var(--accent);font-weight:600;text-decoration:underline;font-size:12px}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#FFF;
         font-size:12px;border-radius:10px;padding:9px 16px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .offline{background:var(--low-bg);color:var(--low);font-size:11px;border-radius:10px;padding:8px 12px;margin:10px 20px 0;display:none}
</style>
</head>

// ================================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, serverTimestamp

const db = initializeFirestore(fbApp, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })

// Firebase AI Logic — runs on the free-tier "homestock" project (separate app instance)
let aiModel = null;
try {
  const aiApp = initializeApp(aiFirebaseConfig, "ai");
  const ai = getAI(aiApp, { backend: new GoogleAIBackend() });

    model: "gemini-2.5-flash",
    generationConfig: { responseMimeType: "application/json" }
  });
} catch(e){ console.warn("AI Logic init failed:", e); }

const CATEGORIES = [
  { id:"kitchen",  label:"Kitchen",       icon:"🍳" },
  { id:"bathroom", label:"Bathroom",      icon:"🛁" },
  { id:"cleaning", label:"Cleaning",      icon:"🧹" },
  { id:"laundry",  label:"Laundry",       icon:"🧺" },
  { id:"personal", label:"Personal care", icon:"🪥" },
  { id:"other",    label:"Other",         icon:"📦" },
];
const UNITS = ["pcs","rolls","packs","bottles","boxes","bags","kg","L"];
const QUICK = [
  { name:"Kitchen towel",     category:"kitchen",  unit:"rolls",   qty:6,  threshold:2 },
  { name:"Toilet paper",      category:"bathroom", unit:"rolls",   qty:12, threshold:4 },
  { name:"Dish soap",         category:"kitchen",  unit:"bottles", qty:2,  threshold:1 },
  { name:"Laundry detergent", category:"laundry",  unit:"bottles", qty:1,  threshold:1 },
  { name:"Trash bags",        category:"cleaning", unit:"packs",   qty:3,  threshold:1 },
  { name:"Hand soap",         category:"bathroom", unit:"bottles", qty:2,  threshold:1 },
];

const $ = (s)=>document.querySelector(s);
const app = $("#app");
const esc = (s)=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const statusOf = (i)=> i.qty<=0 ? "out" : i.qty<=i.threshold ? "low" : "ok";
const stLabel = { ok:"In stock", low:"Running low", out:"Out" };
const catOf = (id)=> CATEGORIES.find(c=>c.id===id) || CATEGORIES[5];
const toast = (msg)=>{ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); };

// ---------- state ----------
let houseCode = localStorage.getItem("homestock-house") || "";
let items = [];
let view = "stock", search = "", catFilter = "all";
let unsub = null;

// ---------- house gate ----------
function randomCode(){
  const words=["mango","lotus","orchid","kopi","merlion","durian","jasmine","bamboo"];
  return words[Math.floor(Math.random()*words.length)]+"-home-"+Math.floor(1000+Math.random()*9000);
}
function renderGate(){
  const suggestion = randomCode();
  app.innerHTML = `
    <div class="gate">
      <div class="big">🏠</div>
      <h1>HomeStock</h1>
      <p>One shared stock list for the whole household.<br>
         Enter your house code — everyone who uses the same code sees the same list.</p>
      <input class="field" id="codeIn" placeholder="e.g. ${suggestion}" autocapitalize="none" autocomplete="off">
      <button class="primary" id="joinBtn">Open my house</button>
      <div class="alt">Setting up for the first time? <button id="newBtn">Create a new house code</button></div>
    </div>`;
  $("#joinBtn").onclick = ()=>{
    const code = $("#codeIn").value.trim().toLowerCase().replace(/\s+/g,"-");
    if(!code) return;
    houseCode = code; localStorage.setItem("homestock-house", code); connect(); 
  };
  $("#newBtn").onclick = ()=>{ $("#codeIn").value = suggestion; };
  $("#codeIn").addEventListener("keydown", e=>{ if(e.key==="Enter") $("#joinBtn").click(); });
}

// ---------- firestore ----------
function itemsCol(){ return collection(db, "households", houseCode, "items"); }
function connect(){
  if(unsub) unsub();
  unsub = onSnapshot(itemsCol(), snap=>{
    items = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    render();
  }, err=>{
    console.error(err);
    toast("Connection problem — check your setup");
  });
  render();
}
const pendingAdds = new Set();
async function saveItem(data, id){
  const payload = {
    name:data.name.trim(), category:data.category, unit:data.unit,
    qty:Math.max(0, Number(data.qty)||0),
    threshold:Math.max(0, Number(data.threshold)||0),
    photo: data.photo ?? null,
    updatedAt:serverTimestamp()
  };
  if(id){
    const prev = items.find(i=>i.id===id) || {};
    payload.fullQty = Math.max(prev.fullQty||1, payload.qty);
    // block renaming into an existing item's name
    const clash = items.find(i=> i.id!==id && i.name.trim().toLowerCase()===payload.name.toLowerCase());
    if(clash){ toast(`"${payload.name}" already exists`); return; }
    await updateDoc(doc(itemsCol(), id), payload);
  } else {
    const key = payload.name.toLowerCase();
    // block duplicates: same name already in the list, or an add already in flight
    const dup = items.find(i=> i.name.trim().toLowerCase()===key);
    if(dup){ toast(`"${payload.name}" is already in your list`); return false; }
    if(pendingAdds.has(key)) return false;
    pendingAdds.add(key);
    try {
      payload.fullQty = Math.max(1, payload.qty);
      payload.bought = false;
      payload.createdAt = serverTimestamp();
      await setDoc(doc(itemsCol()), payload);
      return true;
    } finally {
      pendingAdds.delete(key);
    }
  }
}
async function changeQty(id, delta){
  const it = items.find(i=>i.id===id); if(!it) return;
  await updateDoc(doc(itemsCol(), id), {
    qty: Math.max(0, it.qty+delta),
    fullQty: Math.max(it.fullQty||1, it.qty+delta),
    bought:false, updatedAt:serverTimestamp()
  });
}
async function restock(id){
  const it = items.find(i=>i.id===id); if(!it) return;
  await updateDoc(doc(itemsCol(), id), {
    qty: Math.max(it.fullQty||1, it.threshold+1), bought:false, updatedAt:serverTimestamp()
  });
  toast(`${it.name} restocked`);
}
async function toggleBought(id, v){ await updateDoc(doc(itemsCol(), id), { bought:v }); }
async function removeItem(id){ await deleteDoc(doc(itemsCol(), id)); }

// ---------- purchase advisor ----------
const ZH_DICT = [
  [/kitchen (towel|roll)|paper towel/i, "厨房纸巾"],
  [/toilet (paper|roll)/i, "卷纸 家用装"],
  [/tissue/i, "抽纸"],
  [/dish ?soap|dishwashing/i, "洗洁精"],
  [/laundry (detergent|liquid|powder)|washing (liquid|powder)/i, "洗衣液"],
  [/fabric softener/i, "衣物柔顺剂"],
  [/trash bag|garbage bag|rubbish bag/i, "垃圾袋 加厚"],
  [/hand (soap|wash)/i, "洗手液"],
  [/shampoo/i, "洗发水"],
  [/body wash|shower gel/i, "沐浴露"],
  [/toothpaste/i, "牙膏"],
  [/toothbrush/i, "牙刷"],
  [/sponge/i, "洗碗海绵"],
  [/batter(y|ies)/i, "电池 5号 7号"],
  [/light ?bulb/i, "LED灯泡"],
  [/wet wipes|wipes/i, "湿巾"],
  [/diaper/i, "纸尿裤"],
  [/floor cleaner/i, "地板清洁剂"],
  [/bleach/i, "漂白水"],
  [/air ?freshener/i, "空气清新剂"],
  [/insect|mosquito/i, "驱蚊 灭虫"],
  [/aluminium foil|aluminum foil/i, "铝箔纸"],
  [/cling (wrap|film)|plastic wrap/i, "保鲜膜"],
  [/ziplock|zip lock/i, "密封袋"],
];
const zhQuery = (name)=> (ZH_DICT.find(([re])=>re.test(name))||[null,name])[1];

function advise(item){
  const name = item.name.toLowerCase();
  const isLiquid = /\b(soap|detergent|shampoo|wash|gel|liquid|bleach|softener|cleaner|saniti[sz]er|spray|oil|sauce)\b/.test(name);
  const isBulkPaper = /towel|tissue|paper|roll|wipes|diaper/.test(name);
  const out = item.qty <= 0;
  const veryLow = !out && item.qty <= Math.max(1, Math.ceil(item.threshold/2));

  let verdict, why, cls;
  if(out){
    verdict = "Buy locally — today";
    cls = "out";
    why = `You're completely out, so China shipping (7–21 days) is too slow. Grab it at the supermarket today, or Shopee/Lazada SG delivers in 1–3 days if you can stretch that long. Restock the bulk pack from Taobao/PDD afterwards so you're never caught out again.`;
  } else if(isLiquid){
    verdict = "Buy locally / Shopee SG";
    cls = "low";
    why = `Liquids are heavy and usually restricted to sea freight from China (2–4 weeks), and the shipping cost eats the savings. Local brands at FairPrice or bundle deals on Shopee SG are almost always the better buy for this.`;
  } else if(isBulkPaper && !veryLow){
    verdict = "Taobao / PDD — order now";
    cls = "ok";
    why = `Paper and disposable goods are where Taobao and Pinduoduo save the most — bulk packs often cost 30–50% less than local. You still have buffer stock, which covers the 7–14 day direct shipping comfortably. PDD is usually cheapest; Taobao has more brand choice — tap both below and compare the per-piece price including shipping.`;
  } else if(veryLow){
    verdict = "Shopee SG (1–3 days)";
    cls = "low";
    why = `You're very low — the 7–14 day China lead time is cutting it fine. Shopee/Lazada SG gets it to you in 1–3 days at decent prices. If you want the Taobao/PDD bulk price anyway, buy one local pack to bridge the gap and order the bulk pack in parallel.`;
  } else {
    verdict = "Compare Taobao / PDD first";
    cls = "ok";
    why = `You have enough buffer to wait out the 7–14 day direct shipping, so it's worth checking the China price first. Rule of thumb: if the Taobao/PDD price including shipping isn't at least ~25% cheaper than Shopee SG, just buy local and get it faster.`;
  }

  const en = encodeURIComponent(item.name);
  const zh = encodeURIComponent(zhQuery(item.name));
  return { verdict, why, cls, links: [
    { label:"Taobao 淘宝", sub:"7–14 days", url:`https://s.taobao.com/search?q=${zh}` },
    { label:"Pinduoduo 拼多多", sub:"10–20 days", url:`https://mobile.yangkeduo.com/search_result.html?search_key=${zh}` },
    { label:"Shopee SG", sub:"1–3 days", url:`https://shopee.sg/search?keyword=${en}` },
    { label:"FairPrice", sub:"today / next day", url:`https://www.fairprice.com.sg/search?query=${en}` },
  ]};
}

// ---------- photo helpers ----------
async function shrinkImageDataURL(file, max=1024, quality=0.8){
  const img = await createImageBitmap(file);
  const scale = Math.min(1, max / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL("image/jpeg", quality);
}
async function shrinkImage(file, max=1024){
  return (await shrinkImageDataURL(file, max, 0.8)).split(",")[1];
}
// Small square version kept as each item's display photo, stored inline on the Firestore doc.
async function thumbnailDataURL(file){
  return shrinkImageDataURL(file, 640, 0.85);
}
// Crop a square region out of a photo using an AI bounding box ([ymin,xmin,ymax,xmax], 0-1000).
async function cropBoxDataURL(src, box, out=640){
  const img = new Image();
  await new Promise((res, rej)=>{ img.onload=res; img.onerror=rej; img.src=src; });
  const W = img.naturalWidth, H = img.naturalHeight;
  const [y0,x0,y1,x1] = box.map(v=>Math.min(1000, Math.max(0, v)));
  const bw = (x1-x0)/1000*W, bh = (y1-y0)/1000*H;
  if(bw <= 0 || bh <= 0) throw new Error("empty box");
  // pad the box a little and square it, clamped to the image
  const size = Math.min(Math.max(bw, bh)*1.12, W, H);
  const cx = (x0/1000*W)+bw/2, cy = (y0/1000*H)+bh/2;
  const x = Math.min(Math.max(0, cx-size/2), W-size);
  const y = Math.min(Math.max(0, cy-size/2), H-size);
  const c = document.createElement("canvas");
  c.width = c.height = out;
  const ctx = c.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img, x, y, size, size, 0, 0, out, out);
  return c.toDataURL("image/jpeg", 0.85);
}
// Gemini returns bounding boxes in several shapes: "box_2d" or "box" keys, arrays or
// {ymin,...} objects, 0-1000 integers or 0-1 floats. Normalize all of them to
// [ymin,xmin,ymax,xmax] in 0-1000, or null if unusable.
function normalizeBox(raw){
  if(!raw) return null;
  let a = null;
  if(Array.isArray(raw) && raw.length === 4) a = raw.map(Number);
  else if(typeof raw === "object"){
    const o = raw;
    if(["ymin","xmin","ymax","xmax"].every(k=>k in o)) a = [o.ymin,o.xmin,o.ymax,o.xmax].map(Number);
  }
  if(!a || a.some(v=>!Number.isFinite(v))) return null;
  if(a.every(v=>v >= 0 && v <= 1)) a = a.map(v=>v*1000);   // 0-1 floats
  a = a.map(v=>Math.min(1000, Math.max(0, v)));
  const [y0,x0,y1,x1] = a;
  if(y1-y0 < 20 || x1-x0 < 20) return null;                // degenerate / speck-sized box
  return a;
}
async function countFromPhoto(file, name, unit){
  if(!aiModel) throw new Error("AI not ready — enable AI Logic in Firebase");
  const b64 = await shrinkImage(file);
  const prompt = `You are doing a household stock take. Count how many "${name}" are visible in this photo, in units of "${unit}". Count individual sellable units (e.g. each roll, bottle, pack or box). Partially visible units count as one. If a multipack's label states its contents (e.g. "10 rolls") and the pack is unopened, use the stated number.
Then detect ONE single item of "${name}" that is fully visible and representative — just that one unit, not the whole group — and output its 2D bounding box.
Respond ONLY with minified JSON, no markdown, exactly this shape: {"count": <integer>, "note": "<max 12 words: what you counted or any uncertainty>", "box_2d": [ymin, xmin, ymax, xmax]} with box_2d coordinates as integers normalized to 0-1000.`;
  const result = await aiModel.generateContent([
    { inlineData: { mimeType: "image/jpeg", data: b64 } },
    { text: prompt }
  ]);
  const txt = result.response.text();
  if(!txt) throw new Error("Empty response (image may have been blocked)");
  const clean = txt.replace(/```json|```/g,"").trim();
  let out;
  try { out = JSON.parse(clean); }
  catch(e){ throw new Error("Unexpected reply: " + clean.slice(0,60)); }
  if(typeof out.count !== "number" || out.count < 0) throw new Error("No count in reply");
  out.box = normalizeBox(out.box_2d ?? out.box);
  if(!out.box) console.warn("no usable box in AI reply:", JSON.stringify(out.box_2d ?? out.box ?? null));
  return out;
}

// ---------- render ----------
function render(){
  if(!houseCode){ renderGate(); return; }
  const low = items.filter(i=>statusOf(i)!=="ok");
  const rank = { out:0, low:1, ok:2 };

  let listHTML = "";
  if(view==="stock"){
    let vis = items
      .filter(i=> catFilter==="all" || i.category===catFilter)
      .filter(i=> !search || i.name.toLowerCase().includes(search.toLowerCase()))
      .sort((a,b)=> rank[statusOf(a)]-rank[statusOf(b)] || a.name.localeCompare(b.name));
    if(items.length===0){
      listHTML = `<div class="empty"><div class="big">🏠</div><b>Start your stock check</b>
        Add items with the + button, or start with the usual suspects:
        <div class="quick">${QUICK.map((q,i)=>`<button data-quick="${i}">+ ${esc(q.name)}</button>`).join("")}</div></div>`;
    } else if(vis.length===0){
      listHTML = `<div class="empty">No items match. Try a different search or category.</div>`;
    } else {
      listHTML = `<div class="list">${vis.map(cardHTML).join("")}</div>`;
    }
  } else {
    const sorted = [...low].sort((a,b)=>rank[statusOf(a)]-rank[statusOf(b)]);
    listHTML = low.length===0
      ? `<div class="empty"><div class="big">✅</div><b>Nothing to buy</b>
         Everything is above its low-stock level. Items appear here automatically when they run low.</div>`
      : `<div class="hint">Tick items as you buy them, then tap Restocked to update your stock.</div>
         <div class="list">${sorted.map(shopHTML).join("")}</div>`;
  }

  app.innerHTML = `
    <header>
      <div class="headrow">
        <div>
          <div class="brand">HomeStock</div>
          <h1>House supplies</h1>
        </div>
        <div class="count"><b>${items.length}</b><span>items tracked</span></div>
      </div>
      <div class="house">House: <b>${esc(houseCode)}</b> · <button id="leaveBtn">switch</button></div>
      <div class="offline" id="offline">You're offline — changes will sync when you reconnect.</div>
    </header>
    <div class="tabs">
      <button class="${view==="stock"?"on":""}" data-view="stock">Stock</button>
      <button class="${view==="shopping"?"on":""}" data-view="shopping">Shopping list${low.length?` (${low.length})`:""}</button>
    </div>
    ${view==="stock" ? `
      <div class="search"><input id="searchIn" placeholder="Search items" value="${esc(search)}"></div>
      <div class="chips">
        <button class="chip ${catFilter==="all"?"on":""}" data-cat="all">All</button>
        ${CATEGORIES.map(c=>`<button class="chip ${catFilter===c.id?"on":""}" data-cat="${c.id}">${c.icon} ${c.label}</button>`).join("")}
      </div>` : ""}
    ${listHTML}
    <button class="fab" id="addBtn" aria-label="Add item">+</button>`;

  bind();
  updateOffline();
}

function thumbHTML(i){
  const cat = catOf(i.category);
  return i.photo
    ? `<img src="${i.photo}" class="thumb" data-zoom="${i.id}" alt="Photo of ${esc(i.name)}">`
    : `<div class="thumb thumb-ph">${cat.icon}</div>`;
}
function openCropper(src, onDone){
  const ov = document.createElement("div");
  ov.className = "cropper";
  ov.innerHTML = `
    <div class="crop-hint">Frame a single item — the square becomes the thumbnail.<br>Drag to move, use the corner dot to resize.</div>
    <div class="crop-stage">
      <img src="${src}">
      <div class="crop-box"><div class="crop-handle"></div></div>
    </div>
    <div class="crop-actions">
      <button class="crop-cancel">Cancel</button>
      <button class="crop-ok">Use as thumbnail</button>
    </div>`;
  document.body.appendChild(ov);
  const img = ov.querySelector("img"), box = ov.querySelector(".crop-box"), handle = ov.querySelector(".crop-handle");
  let st = null;
  const place = ()=>{
    box.style.left = st.x+"px"; box.style.top = st.y+"px";
    box.style.width = st.s+"px"; box.style.height = st.s+"px";
  };
  const init = ()=>{
    const W = img.clientWidth, H = img.clientHeight;
    if(!W || !H) return;
    const s = Math.min(W, H)*0.6;
    st = { x:(W-s)/2, y:(H-s)/2, s, W, H };
    place();
  };
  if(img.complete) init(); else img.onload = init;
  let drag = null;
  box.addEventListener("pointerdown", e=>{
    if(!st) return;
    drag = { resize: e.target===handle, px:e.clientX, py:e.clientY, x:st.x, y:st.y, s:st.s };
    box.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  box.addEventListener("pointermove", e=>{
    if(!drag) return;
    const dx = e.clientX-drag.px, dy = e.clientY-drag.py;
    if(drag.resize){
      st.s = Math.min(Math.max(40, drag.s+Math.max(dx,dy)), Math.min(st.W-st.x, st.H-st.y));
    } else {
      st.x = Math.min(Math.max(0, drag.x+dx), st.W-st.s);
      st.y = Math.min(Math.max(0, drag.y+dy), st.H-st.s);
    }
    place();
  });
  box.addEventListener("pointerup", ()=>{ drag = null; });
  ov.querySelector(".crop-cancel").onclick = ()=>ov.remove();
  ov.querySelector(".crop-ok").onclick = ()=>{
    if(!st) return;
    const scale = img.naturalWidth/st.W;
    const c = document.createElement("canvas");
    c.width = 640; c.height = 640;
    const ctx = c.getContext("2d");
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(img, st.x*scale, st.y*scale, st.s*scale, st.s*scale, 0, 0, 640, 640);
    ov.remove();
    onDone(c.toDataURL("image/jpeg", 0.85));
  };
}
function openLightbox(src, name){
  const ov = document.createElement("div");
  ov.className = "lightbox";
  ov.innerHTML = `<figure><img src="${src}" alt="${esc(name)}"><figcaption>${esc(name)}</figcaption></figure>`;
  ov.onclick = ()=>ov.remove();
  document.body.appendChild(ov);
}
function cardHTML(i){
  const st = statusOf(i), cat = catOf(i.category);
  return `<div class="card ${st}">
    <button class="info inforow" data-edit="${i.id}">
      ${thumbHTML(i)}
      <div class="infotext">
        <div class="name">${esc(i.name)}</div>
        <div class="meta"><span class="badge ${st}">${stLabel[st]}</span><span class="cat">${cat.icon} ${cat.label}</span></div>
      </div>
    </button>
    <div class="stepper">
      <button data-dec="${i.id}" ${i.qty<=0?"disabled":""}>−</button>
      <div class="qty ${st}"><b>${i.qty}</b><span>${esc(i.unit)}</span></div>
      <button data-inc="${i.id}">+</button>
    </div>
    <button class="del" data-del="${i.id}" aria-label="Delete ${esc(i.name)}">🗑</button>
  </div>`;
}
function shopHTML(i){
  const st = statusOf(i);
  return `<div class="card">
    <input type="checkbox" data-buy="${i.id}" ${i.bought?"checked":""}>
    <div class="info">
      <div class="name ${i.bought?"done":""}">${esc(i.name)}</div>
      <div class="meta"><span class="badge ${st}">${stLabel[st]} · ${i.qty} ${esc(i.unit)} left</span></div>
    </div>
    <button class="advice" data-advice="${i.id}">💡 Where?</button>
    <button class="restock" data-restock="${i.id}">Restocked</button>
  </div>`;
}

function bind(){
  $("#addBtn").onclick = ()=>openModal();
  $("#leaveBtn").onclick = ()=>{ if(confirm("Switch to a different house code?")){ localStorage.removeItem("homestock-house"); houseCode=""; if(unsub)unsub(); render(); } };
  document.querySelectorAll("[data-view]").forEach(b=> b.onclick=()=>{ view=b.dataset.view; render(); });
  document.querySelectorAll("[data-cat]").forEach(b=> b.onclick=()=>{ catFilter=b.dataset.cat; render(); });
  document.querySelectorAll("[data-inc]").forEach(b=> b.onclick=()=>changeQty(b.dataset.inc, 1));
  document.querySelectorAll("[data-dec]").forEach(b=> b.onclick=()=>changeQty(b.dataset.dec, -1));
  document.querySelectorAll("[data-edit]").forEach(b=> b.onclick=()=>openModal(items.find(i=>i.id===b.dataset.edit)));
  // stopPropagation: on the stock list the thumbnail sits inside the edit button — zoom instead of opening the editor
  document.querySelectorAll("[data-zoom]").forEach(el=> el.onclick=(e)=>{
    e.stopPropagation();
    const it = items.find(i=>i.id===el.dataset.zoom);
    if(it && it.photo) openLightbox(it.photo, it.name);
  });
  document.querySelectorAll("[data-restock]").forEach(b=> b.onclick=()=>restock(b.dataset.restock));
  document.querySelectorAll("[data-advice]").forEach(b=> b.onclick=()=>{
    const it = items.find(i=>i.id===b.dataset.advice); if(it) openAdvice(it);
  });
  document.querySelectorAll("[data-del]").forEach(b=> b.onclick=async ()=>{
    const it = items.find(i=>i.id===b.dataset.del); if(!it) return;
    if(confirm(`Delete "${it.name}" from your stock?`)){ await removeItem(it.id); toast(`${it.name} deleted`); }
  });
  document.querySelectorAll("[data-buy]").forEach(b=> b.onchange=()=>toggleBought(b.dataset.buy, b.checked));
  document.querySelectorAll("[data-quick]").forEach(b=> b.onclick=()=>saveItem(QUICK[Number(b.dataset.quick)]));
  const s = $("#searchIn");
  if(s){ s.oninput = ()=>{ search=s.value; render(); const n=$("#searchIn"); n.focus(); n.setSelectionRange(n.value.length,n.value.length); }; }
}

// ---------- modal ----------
function openModal(item){
  const editing = !!item;
  const f = editing ? {...item} : { name:"", category:"kitchen", unit:"pcs", qty:1, threshold:1, photo:null };
  const aiReady = PHOTO_COUNTING_ENABLED && !!aiModel;
  const photoLabel = aiReady ? "📷 Take photo (auto-counts qty)" : "📷 Take / choose photo";
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="sheet">
    <div class="top"><h2>${editing?"Edit item":"Add item"}</h2><button class="x">×</button></div>
    <label>Item name</label>
    <input class="field" id="fName" placeholder="e.g. Kitchen towel" value="${esc(f.name)}">
    <label>Category</label>
    <div class="chips" style="padding:0 0 16px;flex-wrap:wrap">
      ${CATEGORIES.map(c=>`<button class="chip ${f.category===c.id?"on":""}" data-c="${c.id}">${c.icon} ${c.label}</button>`).join("")}
    </div>
    <div class="row">
      <div><label>Quantity</label><input class="field" id="fQty" type="number" min="0" value="${f.qty}"></div>
      <div><label>Unit</label><select class="field" id="fUnit">${UNITS.map(u=>`<option ${f.unit===u?"selected":""}>${u}</option>`).join("")}</select></div>
      <div><label>Low at</label><input class="field" id="fThr" type="number" min="0" value="${f.threshold}"></div>
    </div>
    <label>Photo</label>
    <div id="photoPreviewWrap"></div>
    <button class="photobtn" id="fPhoto">${photoLabel}</button>
    <input type="file" id="fPhotoIn" accept="image/*" capture="environment" style="display:none">
    <div class="note">"Low at" is the level where this item joins your shopping list.</div>
    <button class="primary" id="fSave">${editing?"Save changes":"Add to stock"}</button>
    ${editing?`<button class="danger" id="fDel">Delete item</button>`:""}
  </div>`;
  document.body.appendChild(ov);
  const close = ()=>ov.remove();
  ov.onclick = (e)=>{ if(e.target===ov) close(); };
  ov.querySelector(".x").onclick = close;
  ov.querySelectorAll("[data-c]").forEach(b=> b.onclick=()=>{ f.category=b.dataset.c;
    ov.querySelectorAll("[data-c]").forEach(x=>x.classList.toggle("on", x.dataset.c===f.category)); });

  const previewWrap = ov.querySelector("#photoPreviewWrap");
  let origPhoto = null; // full-frame source for (re-)cropping, kept only while the sheet is open
  function renderPreview(){
    previewWrap.innerHTML = f.photo
      ? `<div class="photopreview-wrap"><img src="${f.photo}" class="photopreview" style="cursor:zoom-in">
           <button type="button" class="photopreview-x" id="fPhotoRemove">×</button>
           <button type="button" class="photopreview-crop" id="fPhotoCrop" aria-label="Crop thumbnail">✂️</button></div>`
      : "";
    const rm = previewWrap.querySelector("#fPhotoRemove");
    if(rm) rm.onclick = ()=>{ f.photo = null; origPhoto = null; renderPreview(); };
    const cr = previewWrap.querySelector("#fPhotoCrop");
    if(cr) cr.onclick = ()=>openCropper(origPhoto || f.photo, cropped=>{ f.photo = cropped; renderPreview(); });
    const pv = previewWrap.querySelector(".photopreview");
    if(pv) pv.onclick = ()=>openLightbox(f.photo, ov.querySelector("#fName").value.trim() || "Photo");
  }
  renderPreview();

  const photoBtn = ov.querySelector("#fPhoto");
  const fileIn = ov.querySelector("#fPhotoIn");
  photoBtn.onclick = ()=>{
    if(aiReady){
      const nm = ov.querySelector("#fName").value.trim();
      if(!nm){ toast("Type the item name first, so I know what to count"); return; }
    }
    fileIn.click();
  };
  fileIn.onchange = async ()=>{
    const file = fileIn.files[0]; if(!file) return;
    try {
      origPhoto = await shrinkImageDataURL(file, 1600, 0.85);
      f.photo = await thumbnailDataURL(file);
      renderPreview();
    } catch(e){ console.error(e); }

    if(aiReady){
      const nm = ov.querySelector("#fName").value.trim();
      const un = ov.querySelector("#fUnit").value;
      photoBtn.disabled = true; photoBtn.textContent = "🔎 Counting…";
      try {
        const r = await countFromPhoto(file, nm, un);
        ov.querySelector("#fQty").value = r.count;
        let cropped = false;
        if(r.box){
          try {
            f.photo = await cropBoxDataURL(origPhoto, r.box);
            renderPreview();
            cropped = true;
          } catch(e){ console.warn("auto-crop failed:", e); }
        }
        toast(cropped
          ? `Counted ${r.count} ${un} · thumbnail auto-cropped to one item${r.note ? " — " + r.note : ""}`
          : `Counted ${r.count} ${un}${r.note ? " — " + r.note : ""} · couldn't isolate one item, tap ✂️ to crop`);
      } catch(e){
        console.error(e);
        toast("Photo count failed: " + (e.message || "unknown error"));
      } finally {
        photoBtn.disabled = false; photoBtn.textContent = photoLabel;
        fileIn.value = "";
      }
    } else {
      fileIn.value = "";
    }
  };
  ov.querySelector("#fSave").onclick = async ()=>{
    f.name = ov.querySelector("#fName").value;
    if(!f.name.trim()) return;
    f.qty = ov.querySelector("#fQty").value;
    f.unit = ov.querySelector("#fUnit").value;
    f.threshold = ov.querySelector("#fThr").value;
    close();
    const created = await saveItem(f, editing?item.id:null);
    if(!editing && created) toast(`${f.name.trim()} added`);
  };
  const del = ov.querySelector("#fDel");
  if(del) del.onclick = async ()=>{ if(confirm(`Delete ${item.name}?`)){ close(); await removeItem(item.id); } };
  if(!editing) ov.querySelector("#fName").focus();
}

window.addEventListener("online", updateOffline);
window.addEventListener("offline", updateOffline);
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

// ---------- start ----------
if(houseCode) connect(); else renderGate();
</script>
